<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Real-Time Messenger</title>
    <style>
        /* এখানে আপনার অ্যাপের ডিজাইন থাকবে */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 10px 15px; border-radius: 15px; margin: 5px 0; max-width: 70%; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        #form { display: flex; padding: 15px; background: #f0f0f0; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 25px; margin-left: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="chat"></div>

    <form id="form">
        <input id="input" placeholder="মেসেজ লিখুন..." autocomplete="off" required>
        <button type="submit">পাঠান</button>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        //------------------------------------------------------------
        // নিচে এই অংশটুকু আপনার ফায়ারবেস কোড দিয়ে পরিবর্তন করুন
        //------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyCG-e4aCcAeWZ1KRgVGJnjI8Jbu1-IO3jc
",
            authDomain: "http://lon-gejai-2.firebaseapp.com
",
            projectId: "lon-gejai-2
",
            storageBucket: "http://lon-gejai-2.firebasestorage.app
",
            messagingSenderId: "76948470610
",
            appId: "1:76948470610:web:28a2a5ef35347d6faed88b
"
        };
        //------------------------------------------------------------

        // ফায়ারবেস চালু করা
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const chat = document.getElementById('chat');

        // ডাটাবেসে মেসেজ পাঠানো
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (input.value.trim() !== "") {
                try {
                    await addDoc(collection(db, "messages"), {
                        text: input.value,
                        createdAt: serverTimestamp()
                    });
                    input.value = '';
                } catch (error) {
                    console.error("Error sending message: ", error);
                }
            }
        });

        // ডাটাবেস থেকে মেসেজ রিয়েল-টাইমে পড়া
        const q = query(collection(db, "messages"), orderBy("createdAt"));
        onSnapshot(q, (snapshot) => {
            chat.innerHTML = ''; // আগের মেসেজ ক্লিয়ার করা
            snapshot.forEach((doc) => {
                const messageData = doc.data();
                if (messageData.text) {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.textContent = messageData.text;
                    chat.appendChild(div);
                }
            });
            chat.scrollTop = chat.scrollHeight; // স্ক্রল নিচে নামানো
        });
    </script>
</body>
</html>
